<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>API Academy — Apna Pehla API Banana Seekho</title>
<link rel="stylesheet" href="style.css" />

<!-- CodeMirror: code editor with Python syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<!-- Pyodide: runs real Python directly in the browser, no backend, no API key, no limits -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">API <span>ACADEMY</span></div>
  <div class="progress-track">
    <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
    <span id="progress-text">0 / 8 routes complete</span>
  </div>
  <span id="pyodide-status">Python engine load ho raha hai…</span>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-heading">Your Route Map</div>
    <nav id="sidebar-routes"></nav>
    <div class="sidebar-footer">
      <button id="reset-progress-btn">↺ Reset progress</button>
    </div>
  </aside>

  <main class="main">
    <div class="lesson-track" id="lesson-track">ROUTE 01</div>
    <h1 class="lesson-title" id="lesson-title">Loading…</h1>
    <p class="lesson-subtitle" id="lesson-subtitle"></p>

    <div class="explanation" id="explanation-content"></div>

    <div id="diagram-container"></div>
    <div class="checklist" id="setup-checklist"></div>

    <!-- Quiz-type lessons -->
    <div id="quiz-container"></div>

    <!-- Code-type lessons -->
    <div id="code-section">
      <div class="code-block-wrap">
        <div class="code-block-label">EXAMPLE</div>
        <pre id="example-block"></pre>
        <div id="example-caption"></div>
      </div>

      <div class="editor-panel">
        <div class="editor-panel-head">
          <span>your_code.py</span>
          <span>editable</span>
        </div>
        <div id="editor-host"></div>
      </div>

      <div class="run-row">
        <button id="run-btn" class="run-btn" disabled>CHECK KARO ▸</button>
        <div class="packet-track">
          <div class="packet-line"></div>
          <div id="packet"></div>
        </div>
      </div>

      <div id="hint-box"></div>

      <div class="console-panel">
        <div class="console-head">
          <span class="console-dot"></span><span class="console-dot"></span><span class="console-dot"></span>
        </div>
        <div id="console-log"></div>
      </div>
    </div>

    <div id="completion-banner"></div>

    <button id="continue-btn">AGLA ROUTE ▸</button>
  </main>
</div>

<script src="lessons.js"></script>
<script src="app.js"></script>
</body>
</html>
